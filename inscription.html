    <h2>Inscrivez-vous.</h2>
<form action="#" method="post">
    <fieldset>

    <label for="utilisateur">Nom d'utilisateur :</label>
            <input type="text" id="utilisateur" name="utilisateur" placeholder="3 caractères minimum"
            pattern="[A-Za-z]{3,}" title="Saisissez votre nom d'utilisateur (3 caractères minimum.)">
    
        <br>

     <label for="email">Entrez votre email :</label>
        <input type="email" 
        id="email"
        name="email" placeholder="Votre mail"
        title="Saisissez votre adresse email">

        <br>

        <label for="mdp">Mot de passe :</label>
        <input type="password" 
        id="mdp" 
        name="mdp" 
        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
        title="Au moins un symbolle. un chiffre. ainsi que 8 caractère minimum.">

        <br>

        <label for="mdpComfirme">Comfirmez le mot de passe :</label>
        <input type="password" 
        id="mdpComfirme" 
        name="mdpComfirme" 
        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
        title="Confirmez le mot de passe">

        <br>

        <input type="submit" value="Création du compte">
        <br>
        <input type="reset" value="Annuler">
    </fieldset>
</form>



<script src="js/script.js"></script>
</body>
