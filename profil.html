<h2>Profil</h2>

<div class="photoProfil">
<img src="ressources/question.svg" id="photoProfil" alt="photo de profil">
</div>

<form action="#" method="post" >
   <div class="encadrer">
    <fieldset>
        
    <label for="utilisateur">Nom d'utilisateur :</label>
            <input type="text" id="utilisateur" name="utilisateur">
        <br>
    <label for="email">Email :</label>
        <input type="email"  id="email" name="email">

        <br>
<div class="select">
    <label for="selectStyle">Choix du Memory : </label>
            <select name="selectStyle" id="selectStyle">
                <option value="valeur1"selected>Memory-legume</option>
                <option value="valeur2" >Memory-dinosaures-avec-nom</option>
                <option value="valeur3">Memory-dinosaures</option>
                <option value="valeur4">Memory-chiens</option>
                <option value="valeur4">Memory-animeaux-domestiques</option>
                <option value="valeur4">Memory-animeaux-animes</option>
                <option value="valeur4">Memory-animeaux</option>
                <option value="valeur4">Memory-alphabet-scrabble</option>
            </select>
            <br>
    <label for="selectSize">Taille du Memory : </label>
            <select name="selectSize" id="selectSize">
                <option value="valeur1"selected>4x3 </option>
                <option value="valeur2" >4x2 </option>
                
            </select>
            <br>
        </div>  
    <div class="btn">
    <input type="submit" id="vert" value="Enregistrez Option">
    </div>

</fieldset>
 </div>
